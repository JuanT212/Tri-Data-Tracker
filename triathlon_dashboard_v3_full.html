function fd(s){if(!s||s<=0)return'0:00';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'):m+':'+String(sc).padStart(2,'0');}
function fp(s){if(!s||s<=0)return'—';const m=Math.floor(s/60),sc=Math.round(s%60);return m+':'+String(sc).padStart(2,'0')+'/km';}
function fdist(km,t){return t==='swim'?Math.round(km*1000)+'m':km.toFixed(1)+'km';}

function pmcData(){
  const s=[...acts].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let ctl=0,atl=0;const out=[];
  s.forEach(a=>{const tss=a.tss||0;ctl=ctl+(tss-ctl)*(1-Math.exp(-1/42));atl=atl+(tss-atl)*(1-Math.exp(-1/7));out.push({date:a.date,ctl:+ctl.toFixed(1),atl:+atl.toFixed(1),tsb:+(ctl-atl).toFixed(1)});});
  return out;
}
function weeks(){
  const W={};
  acts.forEach(a=>{
    const d=new Date(a.date),m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));
    const k=m.toISOString().split('T')[0];
    if(!W[k])W[k]={w:k,swim:0,bike:0,run:0,tss:0};
    if(a.type==='swim')W[k].swim+=a.dist||0;
    else if(['bike','brick'].includes(a.type))W[k].bike+=a.dist||0;
    else if(a.type==='run')W[k].run+=a.dist||0;
    W[k].tss+=a.tss||0;
  });
  return Object.values(W).sort((a,b)=>new Date(a.w)-new Date(b.w));
}
function hrZones(act){
  const max=act.hrMax||fitSettings.maxHR;
  const breaks=[.6,.7,.8,.9,1.0].map(f=>Math.round(f*max));
  const names=['Z1 Recovery','Z2 Base','Z3 Tempo','Z4 Threshold','Z5 VO2max'];
  const colors=['#93C5FD','#6EE7B7','#FDE68A','#FCA5A5','#F87171'];
  if(!act.hrStream||act.hrStream.length<10){
    const pcts=[5,42,28,18,7];
    return pcts.map((p,i)=>({name:names[i],pct:p,sec:Math.round((act.dur||0)*(p/100)),color:colors[i]}));
  }
  const counts=[0,0,0,0,0];
  act.hrStream.forEach(h=>{
    if(h<breaks[0])counts[0]++;else if(h<breaks[1])counts[1]++;else if(h<breaks[2])counts[2]++;else if(h<breaks[3])counts[3]++;else counts[4]++;
  });
  const tot=act.hrStream.length;
  return counts.map((c,i)=>({name:names[i],pct:Math.round((c/tot)*100),sec:Math.round((c/tot)*(act.dur||0)),color:colors[i]}));
}

function powerCurve(pwrStream){
  if(!pwrStream||pwrStream.length<60)return[];
  const durations=[1,5,10,20,30,60,120,300,600,1200,1800,3600];
  return durations.filter(d=>d<=pwrStream.length).map(d=>{
    let best=0;
    for(let i=0;i<=pwrStream.length-d;i++){
      const avg=pwrStream.slice(i,i+d).reduce((s,p)=>s+p,0)/d;
      if(avg>best)best=avg;
    }
    return{dur:d,watts:Math.round(best)};
  });
}

function rOverview(el){

  const runD=acts.filter(a=>['run','brick'].includes(a.type)).reduce((s,a)=>s+(a.dist||0),0);
  const tc=last.tsb<-10?'#F87171':last.tsb>5?'#34D399':'#FBBF24';
  const tl=last.tsb<-10?'Fatigued':last.tsb>5?'Race ready':'Building';
  const wks=weeks();
  const activeInj=injuries.filter(i=>!i.resolved);
  const fitActs=acts.filter(a=>a.fitParsed);
  const raceDate=new Date(fitSettings.raceDate);
  const daysToRace=Math.max(0,Math.round((raceDate-new Date())/(1000*60*60*24)));
  el.innerHTML=`
  ${activeInj.length?`<div style="background:#2a1500;border:1px solid #854d0e;border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:11px;color:#FBBF24;display:flex;align-items:center;gap:8px"><i class="ti ti-bandage" aria-hidden="true"></i>${activeInj.map(i=>i.bodyPart+' — '+i.type).join(' · ')} <button onclick="sw('injury')" style="margin-left:auto;background:transparent;border:1px solid #854d0e;color:#FBBF24;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px">View</button></div>`:''}
  <div class="krow">

function rRaceRender(){
  const ftp=fitSettings.ftp;
  const fm=pmcData(),last=fm[fm.length-1]||{ctl:0,atl:0,tsb:0};
  const raceDate=new Date(fitSettings.raceDate);
  const daysToRace=Math.max(0,Math.round((raceDate-new Date())/(1000*60*60*24)));
  const runs=acts.filter(a=>a.pace).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const avgRecentPace=runs.slice(-5).length?Math.round(runs.slice(-5).reduce((s,r)=>s+r.pace,0)/runs.slice(-5).length):265;
  const swimSec=Math.round((1900/100)*fitSettings.swimPace100);
  const t1=90,t2=60;
  const bikeSpeedKph=30+(ftp-180)*0.055;
  const bikePredSec=Math.round((90/bikeSpeedKph)*3600);
  const fatigueAdj=1+Math.max(0,(last.atl-last.ctl)/100*0.05);
  const runPredPace=Math.round(avgRecentPace*fatigueAdj);
  const runSec=Math.round(runPredPace*21.1);
  const totalSec=swimSec+t1+bikePredSec+runSec+t2;
  const optimistic=Math.round(totalSec*0.95);

function parseFIT(buf){
  const view=new DataView(buf);
  let off=0;
  const hLen=view.getUint8(0);off=hLen;
  const localDefs={};
  const hrS=[],pwrS=[],cadS=[],altS=[],spdS=[];
  let laps=[],summary={};

  const SPORT={0:'bike',1:'run',5:'swim',17:'brick',255:'bike'};
  const LFIELDS={5:'elapsed',6:'distance',9:'calories',18:'avgHR',19:'maxHR',20:'avgCad',13:'avgPwr',14:'maxPwr'};
  const SFIELDS={7:'elapsed',8:'timer',9:'distance',11:'calories',14:'avgSpd',18:'avgHR',19:'maxHR',20:'avgCad',21:'maxCad',22:'avgPwr',23:'maxPwr',25:'sport'};

  function rF(type,size,le){
    let v;
    if(type===0x84||type===0x04){v=size===4?view.getInt32(off,le):size===2?view.getInt16(off,le):view.getInt8(off);}
    else if(type===0x86||type===0x06||type===0x07||type===0x87){v=size===4?view.getUint32(off,le):size===2?view.getUint16(off,le):view.getUint8(off);}
    else if(type===0x88){v=view.getFloat32(off,le);}
    else{let s='';for(let i=0;i<size;i++){const c=view.getUint8(off+i);if(c===0)break;s+=String.fromCharCode(c);}v=s;}
    off+=size;return v;
  }

  try{
    while(off<buf.byteLength-4){
      const rh=view.getUint8(off);off++;
      if(rh&0x80){continue;}
      const localN=rh&0x0F;
      const isDef=(rh>>6)&1;
      if(isDef){
        off++;
        const le=view.getUint8(off++)===0;
        const gMsg=view.getUint16(off,le);off+=2;
        const nF=view.getUint8(off++);
        const fields=[];
        for(let i=0;i<nF;i++){fields.push({num:view.getUint8(off++),size:view.getUint8(off++),type:view.getUint8(off++)});}
        localDefs[localN]={gMsg,fields,le};
      } else {
        const def=localDefs[localN];
        if(!def){break;}
        const startOff=off;
        const data={};
        def.fields.forEach(f=>{try{data[f.num]=rF(f.type,f.size,def.le);}catch(e){off+=f.size;}});
        const g=def.gMsg;
        if(g===20){
          const h=data[3],p=data[7],s=data[6]||data[78],c=data[4],a=data[2]||data[79];
          if(h&&h>40&&h<250)hrS.push(h);
          if(p&&p>20&&p<2500)pwrS.push(p);
          if(s&&s>0&&s<30000){const kph=s/1000*3.6;if(kph>1&&kph<100)spdS.push(s);}
          if(c&&c>0&&c<250)cadS.push(c);
          if(a&&a>100&&a<100000)altS.push(a/5-500);
        }
        if(g===18){const l={};Object.keys(LFIELDS).forEach(k=>{const v=data[+k];if(v!=null)l[LFIELDS[k]]=v;});if(l.elapsed)laps.push(l);}
        if(g===18||g===19){Object.keys(SFIELDS).forEach(k=>{const v=data[+k];if(v!=null)summary[SFIELDS[k]]=v;});}
      }
    }
  }catch(e){}

  const sportCode=summary.sport;
  let sport='bike';
  if(typeof sportCode==='number')sport=SPORT[sportCode]||'bike';
  else if(typeof sportCode==='string'){const sl=sportCode.toLowerCase();sport=sl.includes('run')?'run':sl.includes('swim')?'swim':'bike';}

  const dist=(summary.distance||0)/100000;
  const dur=Math.round((summary.elapsed||summary.timer||0)/1000);
  const avgHR=Math.round(summary.avgHR||0)||Math.round(hrS.reduce((s,h)=>s+h,0)/(hrS.length||1))||0;
  const maxHR=Math.round(summary.maxHR||0)||Math.max(0,...hrS);
  const avgPwr=Math.round(summary.avgPwr||0)||Math.round(pwrS.reduce((s,p)=>s+p,0)/(pwrS.length||1))||0;
  const avgCad=Math.round(summary.avgCad||0)||Math.round(cadS.reduce((s,c)=>s+c,0)/(cadS.length||1))||0;
  const cal=Math.round(summary.calories||0);
  const elev=altS.length>10?Math.max(0,Math.round(altS.slice(1).reduce((s,a,i)=>s+Math.max(0,a-altS[i]),0))):0;

  let np=0;
  if(pwrS.length>=30){
    const rolls=[];for(let i=30;i<=pwrS.length;i++){const sl=pwrS.slice(i-30,i);rolls.push(Math.pow(sl.reduce((s,p)=>s+p,0)/30,4));}
    np=rolls.length?Math.round(Math.pow(rolls.reduce((s,r)=>s+r,0)/rolls.length,.25)):0;
  }

  let avgPace=0;
  if(spdS.length&&sport==='run'){const sorted=[...spdS].sort((a,b)=>a-b).slice(Math.floor(spdS.length*.05),Math.floor(spdS.length*.95));avgPace=sorted.length?Math.round(1000/(sorted.reduce((s,p)=>s+p,0)/sorted.length/1000)):0;}

  let tss=0;
  if(dur>0&&avgHR>0&&!avgPwr){const r=Math.min(1,avgHR/fitSettings.maxHR);tss=Math.round((dur/3600)*r*r*100);}
  if(avgPwr>0&&dur>0){const IF=np/fitSettings.ftp;tss=Math.round((dur*np*IF)/(fitSettings.ftp*3600)*100);}

  const parsedLaps=laps.map((l,i)=>({n:i+1,dur:Math.round((l.elapsed||0)/1000),dist:parseFloat(((l.distance||0)/100000).toFixed(3)),hr:Math.round(l.avgHR||0)||undefined,pwr:Math.round(l.avgPwr||0)||undefined,cad:Math.round(l.avgCad||0)||undefined})).filter(l=>l.dur>10&&(l.hr||l.pwr));

  return{sport,dist:parseFloat(dist.toFixed(3)),dur,hr:avgHR||undefined,hrMax:maxHR||undefined,pwr:avgPwr||undefined,np:np||undefined,pace:avgPace||undefined,cadence:avgCad||undefined,cal:cal||undefined,tss:tss||undefined,elevation:elev||undefined,laps:parsedLaps,hrStream:hrS.length>30?hrS:undefined,pwrStream:pwrS.length>30?pwrS:undefined,cadStream:cadS.length>30?cadS:undefined};
}

function parseCSV(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const sep=lines[0].includes('\t')?'\t':',';
  const hdrs=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map((line,idx)=>{
    const vals=line.split(sep);
    const r={};hdrs.forEach((h,i)=>{const v=(vals[i]||'').trim().replace(/^"|"$/g,'');r[h]=(!isNaN(v)&&v!=='')?parseFloat(v):v;});
    const tr=(r.activity_type||r.type||r.sport||'').toString().toLowerCase();
    const type=tr.includes('run')?'run':tr.includes('swim')?'swim':tr.includes('bik')||tr.includes('cycl')?'bike':tr.includes('brick')||tr.includes('trans')?'brick':'run';
    const rawD=(r.date||r.activity_date||r.start_time||'').toString().slice(0,10).replace(/\//g,'-');
    let dist=parseFloat(r.distance_km||r.distance||r.total_distance||0)||0;
    if(dist>1000)dist/=1000;
    let dur=parseInt(r.duration_sec||r.elapsed_time||r.moving_time||r.total_elapsed_time||0)||0;
    if(dur>86400)dur=Math.round(dur/1000);
    return{dist,dur,type,date:rawD,name:(r.title||r.activity_name||r.name||type[0].toUpperCase()+type.slice(1)).toString(),hr:parseInt(r.avg_hr||r.average_heart_rate||r.hr_avg||0)||undefined,hrMax:parseInt(r.max_hr||r.max_heart_rate||0)||undefined,tss:parseFloat(r.training_stress_score||r.tss||0)||undefined,np:parseFloat(r.normalized_power||r.np||0)||undefined,pwr:parseFloat(r.avg_power||r.average_power||0)||undefined,pace:parseFloat(r.avg_pace||r.pace_avg||0)||undefined,cal:parseInt(r.calories||r.total_calories||0)||undefined,laps:[]};
  }).filter(a=>a.date&&a.date.length===10&&(a.dist>0||a.dur>0));
}

document.getElementById('fileIn').addEventListener('change',async function(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  const msg=document.getElementById('umsg');
  msg.style.display='inline';msg.style.background='#1E293B';msg.style.color='#60A5FA';msg.textContent=`Parsing ${files.length} file(s)...`;
  let fitC=0,csvC=0,errs=0;
  for(const file of files){
    try{
      const ext=file.name.split('.').pop().toLowerCase();
      if(ext==='fit'){
        const buf=await file.arrayBuffer();
        const p=parseFIT(buf);
        const d=new Date(file.lastModified).toISOString().split('T')[0];
        acts.push({id:Date.now()+Math.random(),date:d,name:file.name.replace(/\.fit$/i,'').replace(/[_-]/g,' '),type:p.sport,...p,fitParsed:true});
        fitC++;
      } else if(ext==='csv'){
        const rows=parseCSV(await file.text());
        rows.forEach((r,i)=>acts.push({id:Date.now()+i+Math.random(),...r,fitParsed:false}));
        csvC+=rows.length;
      }
    }catch(e){errs++;}
  }
  document.getElementById('actBadge').textContent=acts.length+' activities';
  const ok=fitC+csvC>0;
  msg.style.background=ok?'#0d2a1a':'#2a0d0d';msg.style.color=ok?'#4ade80':'#F87171';
  msg.textContent=ok?`✓ ${fitC?fitC+' FIT':''}${fitC&&csvC?' + ':''}${csvC?csvC+' CSV':''}${errs?' ('+errs+' errors)':''}`:`⚠ ${errs} error(s) — check file format`;
  render();setTimeout(()=>msg.style.display='none',5000);
  e.target.value='';
});

document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',async e=>{
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files).filter(f=>f.name.match(/\.(fit|csv)$/i));
  if(!files.length)return;
  const dt=new DataTransfer();files.forEach(f=>dt.items.add(f));
  document.getElementById('fileIn').files=dt.files;
  document.getElementById('fileIn').dispatchEvent(new Event('change'));
});

render();
</script>
